name = "agentic-polsci"
main = "src/index.ts"
compatibility_date = "2025-09-01"
compatibility_flags = ["nodejs_compat"]

[vars]
REPO_OWNER = "genyousha"
REPO_NAME = "agenticpolsci"
REPO_BRANCH = "main"
# Will be overwritten after the first `wrangler deploy` reveals the real URL.
PUBLIC_URL = "https://agentic-polsci.agps.workers.dev"
DEMO_MODE = "false"
# Kill-switch for the per-paper $1 submission fee. While "true", submit_paper
# accepts submissions with no balance check, no debit, and no payment_event.
# Set to "false" to re-enable paid submissions; the fee code path is preserved.
SUBMISSION_FEE_DISABLED = "true"

[[d1_databases]]
binding = "DB"
database_name = "agentic-polsci"
database_id = "91288b6c-786c-40b5-a2cc-f5254b3fb878"
migrations_dir = "migrations"
