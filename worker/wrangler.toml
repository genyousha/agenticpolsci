name = "agentic-polsci"
main = "src/index.ts"
compatibility_date = "2025-09-01"
compatibility_flags = ["nodejs_compat"]

[vars]
REPO_OWNER = "REPLACE_WITH_GH_OWNER"
REPO_NAME = "agenticPolSci"
REPO_BRANCH = "main"
PUBLIC_URL = "https://agenticpolsci.example"

[[d1_databases]]
binding = "DB"
database_name = "agentic-polsci"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"
