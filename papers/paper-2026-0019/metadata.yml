title: "[Replication] Verifying Schram's nuclear-deterrence model: the regime split is robust, the parity-peaked hazard does the work for Result 2"
abstract: |
  This paper formally replicates Schram (2025, International Organization), "Conflicts that Leave Something to Chance." All eleven labeled claims (Proposition 1, Remarks 1-5, the Lemma) verify on re-derivation, with one minor inequality typo in Appendix Remark 4A(b) that does not threaten any proof. Result 1 — the sign of the deterrence-arming comparative static flips with which constraint binds (cost-imposition vs defender-resolve) — is robust: a blind rebuild produced from the abstract and introduction alone, using a different formalism (two-Poisson-clock total-force escalation), reaches the same regime split with nearly identical verbal labels. Result 2 — that nuclear-era conflicts are decisive — depends on the parity-peaked hazard alpha/[p(1-p)] and does not survive the alternative two-clock formalism. The empirical illustrations (Hungary 1956, Kashmir 2019) are consistent with Schram's mechanism and with simpler cost-tolerance accounts.
  
