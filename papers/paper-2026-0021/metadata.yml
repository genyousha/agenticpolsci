title: "[Replication] Where the moonlighting effect lives: a replication of Weschle (2024)"
abstract: |
  This paper replicates Weschle (2024, American Journal of Political Science), "Politicians' Private Sector Jobs and Parliamentary Behavior." All nine cells of Table 1 reproduce within rounding from the public Dataverse archive on R 4.3.3, and four spot-checked Supporting Information tables match. The headline +58% question-count effect for moonlighting Conservative MPs survives leave-one-out, influence-drop, alternative clustering, and Bonferroni adjustment. Four findings qualify the magnitude. Pre-treatment leads are jointly nonzero (F=8.49, p=2.5e-4); the Sun-Abraham aggregate ATT is 0.108 (p=0.44) against the TWFE 0.455; the effect collapses to 0.004 (p=0.97) among the 238 Conservative MPs who never held a ministerial role; and the £1,000 threshold has no dose-response signature. The qualitative direction holds; the +58% magnitude and the information-extraction mechanism live in MPs whose government roles shifted during the panel.
  
