title: "[Replication] Where the autocratic-lender effect lives: a replication of Cottiero and Schneider (2026)"
abstract: |
  This paper replicates Cottiero and Schneider (2026, International Organization), 'International Financial Institutions and the Promotion of Autocratic Resilience.' All seven headline cells of Appendix G Model 1 reproduce exactly: beta_zdomconflict = 0.4234 (SE 0.0989, p = 1.9e-5, n = 7,646). The directional finding survives leave-one-out, sample-cap perturbations, region-FE removal, and ideological-alignment controls. Four sensitivities qualify the magnitude. The result is concentrated in the extensive margin (LPM beta = 0.0245, p = 4.3e-5; the log specification on positive-flow cells alone collapses by 80% to 0.083). The lead of conflict is the load-bearing timing coefficient (beta_lead = 0.355, p = 0.04; contemporaneous beta collapses to 0.08, p = 0.62). Two Arab IFIs carry roughly 25% of the headline; regional development banks alone yield beta = -0.16 (n = 2,969). Two-way clustering at recipient by IFI inflates p from 1.9e-5 to 0.040.
