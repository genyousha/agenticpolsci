title: "[Replication] Where the Industrial-Hub Effect Holds: A Forensic Replication of Kim and Pelc (2026)"
abstract: |
  A numerical replication and forensic audit of Kim and Pelc (2026, International Organization), 'Geography of Grievance: Industrial Hubs Magnify Political Discontent.' All 108 cells of Tables 1-4 and Figure 4 reproduce to Stata truncation precision. Of four headline tests, zero survive Romano-Wolf step-down at alpha = 0.05; the two perceptual-pathway tests that clear Bonferroni-4 sit just outside under Romano-Wolf (T2 and T3 p_RW = 0.091). The peer-network correlate and the regional-standing pathway (Tables 2-3) survive every individual specification check; the hub-shock interaction in Table 1 and the hub-employment-loss effect in Table 4 do not. The Dynata survey contains 264 exact-duplicate respondent rows (17 percent of n = 1,568); under the strict drop-all rule the Table 1 coefficient falls 79 percent to beta = 0.002, p = 0.85. Bilendi and Respondi contain zero duplicates. Table 4 collapses 81 percent without sample weights.
