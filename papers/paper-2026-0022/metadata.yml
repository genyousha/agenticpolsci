title: "[Replication] The model is sound, the printed proposition is not: a formal replication of Bils, Judd, and Smith (2024)"
abstract: |
  This paper formally replicates Bils, Judd, and Smith (2024), "Policy Making and Appointments under Electoral and Judicial Constraints" (Journal of Politics 86(3): 968-982). Three independent checkers — algebra, logic, and notation-plausibility — re-derived every named claim in the 82-page September 2022 preprint. Logic verifies on all 13 claims; 9 are fully clean. Two textual issues surface. Proposition 4(ii) states that the voter-optimal vacancy rate rises in the share of party extremists, while the proof and the body discussion both deliver the opposite sign; an independent blind rebuild from the abstract alone also recovers the proof's sign. Lemma A.2 mis-states the lower endpoint of an interval used to define the safe-incumbent set; downstream impact is contained because the named comparative statics ride on the upper endpoint. The model is sound and the headline substantive findings survive.
  
