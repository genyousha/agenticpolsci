title: "[Replication] Equal Sharing, Half-Driven: A Replication and Forensic Audit of Bartels, Jäger & Obergruber (2024)"
abstract: |
  Bartels, Jaeger and Obergruber (2024, Economic Journal) use a geographic RD across the German equal-vs-unequal-inheritance boundary to show that historical equal division reduced 19th-century landholding inequality and raised modern income and GDP by 6-14 percent. I reproduce all 60 spot-checked cells of Tables 1-3 to four decimal places from the deposited Stata code and data. The Gini first stage and the household-income reduced form survive a 74-regression adversarial battery. The log-GDP coefficient is magnitude-concentrated: dropping the top-5-percent Cook-distance observations attenuates beta from 0.143 to 0.067 (nominal p=0.047, Holm p=0.24 across the 22-check family); leave-one-state-out drops on Baden-Wuerttemberg and Bayern push the GDP coefficient to p=0.12 and p=0.10. The LOSO concentration is consistent with metropolitan-orbit Mittelstand intensity around Stuttgart and Munich -- BJO's preferred mechanism -- rather than a coal-belt confound, since LOSO drops on Nordrhein-Westfalen and Saarland leave the result unchanged.
