name: x-post

on:
  schedule:
    # 4 origin posts/day, Mon–Fri only. Times target the high-engagement
    # academic-Twitter windows: 9am, 10am, 1pm, 5pm ET (EDT, UTC-4).
    # In EST winter the slots shift one hour earlier in ET — acceptable.
    # Weekends are deliberately skipped (research: Sat is the worst day,
    # weekends underperform across the board for academic audiences).
    #
    # Volume math (post + self-reply for each origin slot):
    #   4 origin × 5 days × ~4.3 weeks/month = ~86 origin posts/month
    #   plus 86 self-reply posts/month = ~172 writes/month
    #   vs free-tier 1500/month write cap (~11% utilization).
    # Was: 12 origin/day every 2h = 360 origin/month + 360 self-replies =
    # 720/month, plus the research finding that 12/day is over the
    # saturation point for engagement on a niche account.
    #
    # Slot mapping (lines must match the case below):
    - cron: "0 13 * * 1-5"  # 9am ET (EDT) — newest
    - cron: "0 14 * * 1-5"  # 10am ET (EDT) — catalog
    - cron: "0 17 * * 1-5"  # 1pm ET (EDT) — catalog
    - cron: "0 21 * * 1-5"  # 5pm ET (EDT) — site_promo
  workflow_dispatch:
    inputs:
      slot:
        description: "slot to post (site_promo | newest | catalog)"
        required: true
        type: choice
        options: [site_promo, newest, catalog]
        default: site_promo
      dry_run:
        description: "dry run (no posting, no log write)"
        required: true
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: x-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Determine slot from cron or input
        id: slot
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "slot=${{ github.event.inputs.slot }}" >> "$GITHUB_OUTPUT"
            echo "dry_run=${{ github.event.inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          else
            case "${{ github.event.schedule }}" in
              "0 13 * * 1-5") echo "slot=newest"     >> "$GITHUB_OUTPUT" ;;
              "0 14 * * 1-5") echo "slot=catalog"    >> "$GITHUB_OUTPUT" ;;
              "0 17 * * 1-5") echo "slot=catalog"    >> "$GITHUB_OUTPUT" ;;
              "0 21 * * 1-5") echo "slot=site_promo" >> "$GITHUB_OUTPUT" ;;
              *) echo "unknown schedule" && exit 1 ;;
            esac
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: social/package-lock.json

      - name: Install
        run: npm ci
        working-directory: social

      - name: Post
        working-directory: social
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          DRY_FLAG=""
          if [ "${{ steps.slot.outputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          npx tsx bin/post.ts --slot=${{ steps.slot.outputs.slot }} --repo=${{ github.workspace }} $DRY_FLAG

      - name: Commit log update
        if: steps.slot.outputs.dry_run != 'true'
        run: |
          if git diff --quiet -- social/posts.log.jsonl; then
            echo "no log changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stash the log change, rebase onto latest main to avoid losing
          # log entries when an editor agent pushed to main during this run.
          git stash push -- social/posts.log.jsonl
          git pull --rebase origin main
          git stash pop
          git add social/posts.log.jsonl
          git commit -m "chore(social): log post [skip ci]"
          git push
